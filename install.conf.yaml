- defaults:
    link:
      backup: true
      glob: true
      create: true

- clean:
    ~/:
    ~/.oh-my-zsh/custom/:
      recursive: true
    ~/.ssh:

- shell:
  - command: if [ ! -d ~/.oh-my-zsh ]; then sh -c "$(curl -fsSL https://install.ohmyz.sh)"; fi
    description: "Shell: Installing Oh My Zsh!"

- shell:
  - command: git submodule update --init --recursive
    description: "Git: Installing submodules"

- shell:
  - command: touch gitconfig.local
    description: "Git: Ensure gitconfig.local exists"

- link:
    ~/:
      path: gitconfig*
      prefix: '.'
    ~/.Brewfile:
    ~/.gnupg/gpg-agent.conf: gnupg/gpg-agent.conf
    ~/.gnupg/gpg.conf: gnupg/gpg.conf
    ~/.oh-my-zsh/custom/: oh-my-zsh/custom/*.zsh
    ~/.oh-my-zsh/custom/plugins/: oh-my-zsh/custom/plugins/*
    ~/.oh-my-zsh/custom/themes/: oh-my-zsh/custom/themes/**.zsh-theme
    ~/.ssh/config: ssh/config
    ~/.zshrc:

- shell:
  - command: brew bundle --global
    description: "Homebrew: Installing packages"

- shell:
  - command: brew cleanup
    description: "Homebrew: Cleaning up"

- shell:
  - command: |
      if [ -z "$CI" ]; then osascript scripts/setup_terminal.applescript; fi
    description: "macOS: Setting up Terminal.app"
